# AI Security Lab Configuration

# General settings
general:
  safe_mode: false
  max_workers: 50
  timeout: 5

# Module settings
modules:
  subdomain:
    enabled: true
    default_wordlist: "datasets/subdomains.txt"
    max_threads: 100
  
  sqli:
    enabled: true
    max_payloads: 10
  
  fuzzer:
    enabled: true
    max_requests: 100
    max_payload_length: 500
  
  network:
    enabled: true
    default_network: "192.168.1.0/24"
    common_ports: [21, 22, 23, 80, 443, 445, 3389, 8080]

# Output settings
output:
  directory: "results/"
  formats: ["csv", "json"]

# Lab environment
lab:
  docker_compose: "lab_env/docker-compose.yml"
  vulnerable_apps:
    - dvwa
    - webgoat
    - juice-shop